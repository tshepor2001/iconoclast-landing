name: Deploy to Linode

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR=/opt/iconoclast-landing

            mkdir -p "$REPO_DIR"
            cd "$REPO_DIR"

            # Pull latest code
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # Debug: show where site files might be
            echo "=== Web root candidates ==="
            ls /var/www/ 2>/dev/null || echo "/var/www not found"
            find /var/www /srv /home -name "index.html" 2>/dev/null || true
            echo "=== nginx config root ==="
            nginx -T 2>/dev/null | grep -E '^\s*root ' || echo "nginx not found or no root directive"
            echo "==========================="

            # Detect web root
            WEB_ROOT=""
            if command -v nginx &>/dev/null; then
              WEB_ROOT=$(nginx -T 2>/dev/null | grep -m1 '^\s*root ' | awk '{print $2}' | tr -d ';' || true)
            fi
            if [ -z "$WEB_ROOT" ] && command -v apache2ctl &>/dev/null; then
              WEB_ROOT=$(apache2ctl -S 2>/dev/null | grep -m1 'DocumentRoot' | awk '{print $2}' || true)
            fi
            # Fallback to common locations
            if [ -z "$WEB_ROOT" ]; then
              for candidate in /var/www/html /var/www/iconoclast-landing /var/www/iconoclast-labs.co.za /usr/share/nginx/html; do
                if [ -d "$candidate" ]; then
                  WEB_ROOT="$candidate"
                  break
                fi
              done
            fi

            if [ -z "$WEB_ROOT" ]; then
              echo "ERROR: Could not detect web root. Set WEB_ROOT manually in this script."
              exit 1
            fi

            echo "Syncing to web root: $WEB_ROOT"
            rsync -av --delete \
              --exclude='.git' \
              --exclude='.github' \
              "$REPO_DIR/" "$WEB_ROOT/"

            # Reload web server to clear any caches
            systemctl reload nginx 2>/dev/null || systemctl reload apache2 2>/dev/null || true

            echo "✓ Deployment complete — $WEB_ROOT"
