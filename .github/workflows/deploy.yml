name: Deploy to Linode

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Linode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            REPO_DIR=/opt/iconoclast-landing

            mkdir -p "$REPO_DIR"
            cd "$REPO_DIR"

            # Pull latest code
            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            WEB_ROOT=/home/iclabs/iconoclast-landing

            echo "Syncing to web root: $WEB_ROOT"
            rsync -av --delete \
              --exclude='.git' \
              --exclude='.github' \
              "$REPO_DIR/" "$WEB_ROOT/"

            # Reload web server to clear any caches
            systemctl reload nginx 2>/dev/null || systemctl reload apache2 2>/dev/null || true

            echo "✓ Deployment complete — $WEB_ROOT"
